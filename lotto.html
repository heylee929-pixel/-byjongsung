<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천기</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: white;
            --text-color: #333;
            --shadow: rgba(0,0,0,0.1);
            --input-bg: #fff;
            --input-border: #ccc;
        }

        [data-theme='dark'] {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #f0f2f5;
            --shadow: rgba(0,0,0,0.5);
            --input-bg: #3d3d3d;
            --input-border: #555;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: var(--container-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px var(--shadow);
            text-align: center;
            width: 100%;
            max-width: 450px;
            position: relative;
        }
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 20px;
            background: none;
            border: none;
            padding: 0;
            color: var(--text-color);
        }
        h1 { margin-bottom: 30px; }
        .lotto-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .ball {
            width: 40px;
            height: 40px;
            line-height: 40px;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
        }
        .ball-1 { background: #fbc400; }
        .ball-11 { background: #69c8f2; }
        .ball-21 { background: #ff7272; }
        .ball-31 { background: #aaa; }
        .ball-41 { background: #b0d840; }

        .btn-generate {
            margin-top: 10px;
            padding: 12px 25px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            font-weight: bold;
        }
        .btn-generate:hover { background-color: #357abd; }

        /* 제휴 문의 폼 스타일 */
        .inquiry-section {
            margin-top: 40px;
            border-top: 1px solid var(--input-border);
            padding-top: 30px;
            text-align: left;
        }
        .inquiry-section h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            background-color: var(--input-bg);
            color: var(--text-color);
            box-sizing: border-box;
            font-family: inherit;
        }
        .form-group textarea {
            height: 80px;
            resize: vertical;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
    <h1>로또 번호 추천</h1>
    <div id="result"></div>
    <button class="btn-generate" onclick="generateLottoSets()">새로운 번호 생성</button>

    <!-- 제휴 문의 섹션 -->
    <div class="inquiry-section">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/mvzvyvaw" method="POST">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" required placeholder="성함을 입력해주세요">
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="_replyto" required placeholder="연락받을 이메일을 입력해주세요">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" required placeholder="제휴 관련 내용을 입력해주세요"></textarea>
            </div>
            <button type="submit" class="btn-submit">문의 보내기</button>
        </form>
    </div>
</div>

<script>
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-btn');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            btn.innerText = '🌙';
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = '☀️';
        }
    }
    function getBallColorClass(num) {
        if (num <= 10) return 'ball-1';
        if (num <= 20) return 'ball-11';
        if (num <= 30) return 'ball-21';
        if (num <= 40) return 'ball-31';
        return 'ball-41';
    }

    function generateLottoSets() {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = ''; 

        for (let i = 0; i < 3; i++) {
            const numbers = [];
            while (numbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }
            numbers.sort((a, b) => a - b); 

            const row = document.createElement('div');
            row.className = 'lotto-row';

            numbers.forEach(num => {
                const ball = document.createElement('div');
                ball.className = `ball ${getBallColorClass(num)}`;
                ball.innerText = num;
                row.appendChild(ball);
            });

            resultDiv.appendChild(row);
        }
    }

    window.onload = generateLottoSets;
</script>

</body>
</html>
