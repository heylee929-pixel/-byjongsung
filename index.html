<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추천</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f7f6;
            padding: 20px;
        }
        h2 { color: #333; }
        .lotto-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .label {
            font-weight: bold;
            margin-right: 10px;
            min-width: 50px;
        }
        .ball {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 5px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.2);
        }
        /* 번호대별 색상 지정 */
        .n1 { background-color: #fbc400; } /* 1~10 */
        .n11 { background-color: #69c8f2; } /* 11~20 */
        .n21 { background-color: #ff7285; } /* 21~30 */
        .n31 { background-color: #aaaaaa; } /* 31~40 */
        .n41 { background-color: #b0d840; } /* 41~45 */
        
        button {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <h2>🍀 이번 주 행운의 번호</h2>
    <div class="lotto-container" id="lotto-display">
    </div>
    <button onclick="generateLotto()">새로 생성하기</button>

    <script>
        function getBallClass(num) {
            if (num <= 10) return 'n1';
            if (num <= 20) return 'n11';
            if (num <= 30) return 'n21';
            if (num <= 40) return 'n31';
            return 'n41';
        }

        function generateLotto() {
            const container = document.getElementById('lotto-display');
            container.innerHTML = ''; // 초기화

            for (let i = 1; i <= 5; i++) {
                let numbers = [];
                while (numbers.length < 6) {
                    let n = Math.floor(Math.random() * 45) + 1;
                    if (!numbers.includes(n)) {
                        numbers.push(n);
                    }
                }
                numbers.sort((a, b) => a - b);

                const row = document.createElement('div');
                row.className = 'row';
                
                const label = document.createElement('span');
                label.className = 'label';
                label.innerText = `제 ${i} 게임`;
                row.appendChild(label);
                
                numbers.forEach(num => {
                    const ball = document.createElement('div');
                    ball.className = 'ball ' + getBallClass(num);
                    ball.innerText = num;
                    row.appendChild(ball);
                });

                container.appendChild(row);
            }
        }
        
        // 페이지 로드 시 바로 번호 생성
        window.onload = generateLotto;
    </script>

</body>
</html>
